<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoTV Hints</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222633;
      --border: #2e3345;
      --text: #e4e6ef;
      --muted: #8b90a5;
      --accent: #7c9cff;
      --accent-dim: #5a72c4;
      --success: #6bcf8a;
      --spoiler-bg: #141822;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }

    header {
      padding: 2rem 1.5rem 1rem;
      max-width: 720px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .category {
      margin-bottom: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .category-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .category-header:hover {
      background: var(--surface-hover);
    }

    .category-heading {
      flex: 1;
      min-width: 0;
    }

    .category-header h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 600;
    }

    .category-header p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .category-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      padding-top: 0.05rem;
    }

    .category-count {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--spoiler-bg);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }

    .category.open .category-chevron {
      transform: rotate(90deg);
    }

    .category-body {
      display: none;
      padding: 0 0.75rem 0.75rem;
      border-top: 1px solid var(--border);
    }

    .category.open .category-body {
      display: block;
    }

    .event {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.6rem;
      overflow: hidden;
    }

    .event-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .event-header:hover {
      background: var(--surface-hover);
    }

    .event-title {
      font-weight: 500;
      font-size: 0.95rem;
    }

    .event-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .step-count {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--spoiler-bg);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }

    .chevron {
      color: var(--muted);
      font-size: 0.75rem;
      transition: transform 0.2s;
    }

    .event.open .chevron {
      transform: rotate(90deg);
    }

    .event-body {
      display: none;
      padding: 0 1rem 1rem;
      border-top: 1px solid var(--border);
    }

    .event.open .event-body {
      display: block;
    }

    .steps {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .step {
      background: var(--spoiler-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .step-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-dim);
      padding: 0.55rem 0.75rem 0.35rem;
    }

    .step-reveal {
      position: relative;
      min-height: 2.75rem;
      cursor: ew-resize;
      touch-action: none;
      user-select: none;
      --reveal: 0%;
    }

    .step-content {
      padding: 0.65rem 0.75rem;
      font-size: 0.88rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .step-cover {
      position: absolute;
      inset: 0;
      left: var(--reveal);
      background: var(--spoiler-bg);
      border-left: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 0.75rem;
      pointer-events: none;
    }

    .step-reveal:not([data-reveal-pct="0"]) .step-cover {
      border-left-color: var(--accent-dim);
    }

    .step-cover-hint {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .step-reveal:not([data-reveal-pct="0"]) .step-cover-hint,
    .step-reveal.is-dragging .step-cover-hint {
      display: none;
    }

    .step-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: var(--reveal);
      width: 14px;
      margin-left: -7px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: ew-resize;
    }

    .step-handle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .step-handle-grip {
      width: 4px;
      height: 1.6rem;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
    }

    .step-reveal[data-reveal-pct="0"] .step-handle-grip {
      background: var(--accent-dim);
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    footer a {
      color: var(--accent-dim);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }
  </style>
</head>

      "id": "siren-pole",

      "code_name": "Siren Pole",
      "steps": [
        "Always out there — if you're not in Sandbox.",

        "Northeast corner of the map, far out of bounds.",
        "Teleports short distances when unobserved. Cannot move while watched through a camera."

    },
    {

      "category": "forbiddens",
      "code_name": "The Bone Man",
      "steps": [
        "A skeleton with an encrypted note about bones.",
        "Found at [ X:-1907.72 / Y:1731.19 ]",
        "Note repeats encrypted text about \"bones of void…\" Reportedly has an unseen event."
      ]
    },
    {
      "id": "shadow-spider",
      "category": "forbiddens",
      "code_name": "Shadow Spider",
      "steps": [
        "A dark shape with six arms — one frame in the Tutorial.",
        "Random chance in the first room of the Tutorial.",
        "Also known as Tutorial Spider. Appears one frame then despawns."

    {

      "category": "forbiddens",

      "steps": [
        "Footsteps and splashes — but nobody visible.",

    },
    {

      "category": "forbiddens",
      "code_name": "False Kel",
      "steps": [

        "Exact Kel copy runs to a corner building. Too close → crash. Passes through everything."

    {
      "id": "eight-great-figures",
      "category": "forbiddens",
      "code_name": "The Eight Great Figures",
      "steps": [
        "Eight black figures in the gm_construct sky.",
        "Place four body bags around the water bottle at [ X:-65.12 / Y:-24.57 ]. Find all 7 skulls. Interact with the bloody skull.",

  </script>

  <script>
    const app = document.getElementById('app');
    const data = JSON.parse(document.getElementById('event-data').textContent);

    document.getElementById('page-title').textContent = data.meta.title;
    document.getElementById('page-subtitle').textContent = data.meta.subtitle;
    document.getElementById('source-link-events').href = data.meta.sourceEvents;
    document.getElementById('source-link-entities').href = data.meta.sourceEntities;

    const allItems = [
      ...(data.events || []),
      ...(data.entities || []),
    ];

    const byCategory = Object.fromEntries(
      data.categories.map((c) => [c.id, { ...c, items: [] }])
    );
    for (const item of allItems) {
      if (byCategory[item.category]) {
        byCategory[item.category].items.push(item);
      }
    }

    app.innerHTML = data.categories
      .map((cat) => {
        const group = byCategory[cat.id];
        if (!group.items.length) return '';
        return `
          <section class="category" id="${cat.id}">
            <div class="category-header" role="button" tabindex="0" aria-expanded="false">
              <div class="category-heading">
                <h2>${escapeHtml(cat.label)}</h2>
                <p>${escapeHtml(cat.description)}</p>
              </div>
              <span class="category-meta">
                <span class="category-count">${group.items.length} entries</span>
                <span class="chevron category-chevron">▶</span>
              </span>
            </div>
            <div class="category-body">
              ${group.items.map(renderItem).join('')}
            </div>
          </section>`;
      })
      .join('');

    app.querySelectorAll('.category-header').forEach((header) => {
      const toggle = () => {
        const section = header.closest('.category');
        const open = section.classList.toggle('open');
        header.setAttribute('aria-expanded', open ? 'true' : 'false');
      };
      header.addEventListener('click', toggle);
      header.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggle();
        }
      });
    });

    app.querySelectorAll('.event-header').forEach((header) => {
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        header.closest('.event').classList.toggle('open');
      });
    });

    app.querySelectorAll('.step-reveal').forEach(initRevealSlider);

    function renderRevealBlock(label, contentHtml) {
      return `
        <li class="step">
          <div class="step-label">${escapeHtml(label)}</div>
          <div class="step-reveal" data-reveal-pct="0" style="--reveal: 0%">
            <div class="step-content">${contentHtml}</div>
            <div class="step-cover" aria-hidden="true">
              <span class="step-cover-hint">Slide to peek →</span>
            </div>
            <div class="step-handle" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="${escapeHtml(label)}" tabindex="0">
              <span class="step-handle-grip" aria-hidden="true"></span>
            </div>
          </div>
        </li>`;
    }

    function renderItem(item) {
      const steps = item.steps
        .map((text, i) => renderRevealBlock(`Hint ${i + 1}`, escapeHtml(text)))
        .join('');

      return `
        <article class="event" id="${item.id}">
          <div class="event-header">
            <span class="event-title">${escapeHtml(item.code_name)}</span>
            <span class="event-meta">
              <span class="step-count">${item.steps.length} hints</span>
              <span class="chevron">▶</span>
            </span>
          </div>
          <div class="event-body">
            <ol class="steps">${steps}</ol>
          </div>
        </article>`;
    }

    function initRevealSlider(el) {
      let dragging = false;

      const setReveal = (pct) => {
        const clamped = Math.max(0, Math.min(100, pct));
        el.style.setProperty('--reveal', `${clamped}%`);
        el.dataset.revealPct = String(Math.round(clamped));
        el.querySelector('.step-handle').setAttribute('aria-valuenow', String(Math.round(clamped)));
      };

      const pctFromClientX = (clientX) => {
        const rect = el.getBoundingClientRect();
        if (rect.width <= 0) return 0;
        return ((clientX - rect.left) / rect.width) * 100;
      };

      const onPointerDown = (e) => {
        if (e.button !== undefined && e.button !== 0) return;
        e.preventDefault();
        e.stopPropagation();
        dragging = true;
        el.classList.add('is-dragging');
        el.setPointerCapture(e.pointerId);
        setReveal(pctFromClientX(e.clientX));
      };

      const onPointerMove = (e) => {
        if (!dragging) return;
        e.preventDefault();
        setReveal(pctFromClientX(e.clientX));
      };

      const endDrag = (e) => {
        if (!dragging) return;
        dragging = false;
        el.classList.remove('is-dragging');
        if (el.hasPointerCapture(e.pointerId)) {
          el.releasePointerCapture(e.pointerId);
        }
      };

      el.addEventListener('pointerdown', onPointerDown);
      el.addEventListener('pointermove', onPointerMove);
      el.addEventListener('pointerup', endDrag);
      el.addEventListener('pointercancel', endDrag);

      const handle = el.querySelector('.step-handle');
      handle.addEventListener('keydown', (e) => {
        const current = Number(el.dataset.revealPct || 0);
        let next = current;
        if (e.key === 'ArrowRight' || e.key === 'ArrowUp') next = current + 5;
        if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') next = current - 5;
        if (e.key === 'Home') next = 0;
        if (e.key === 'End') next = 100;
        if (next === current) return;
        e.preventDefault();
        e.stopPropagation();
        setReveal(next);
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
